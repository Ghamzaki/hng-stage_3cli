name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]" || pip install -e . && pip install ruff

      - name: Lint
        run: ruff check insighta/

      - name: Verify CLI entry point
        run: insighta --help
